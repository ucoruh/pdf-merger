site_name: PDF Merger Documentation
site_url: https://ucoruh.github.io/pdf-merger/
site_author: Ugur CORUH
site_description: >-
  A Windows desktop application for merging PDF files with specialized
  support for single-side ADF scanners.

repo_name: ucoruh/pdf-merger
repo_url: https://github.com/ucoruh/pdf-merger

copyright: Copyright &copy; 2021-2026 Ugur CORUH

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/logo.png

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide: user-guide.md
  - Development: development.md
  - API Reference: api-reference.md
  - Contributing: contributing.md
  - Changelog: changelog.md
