name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract version from tag
      id: version
      run: |
        $version = "${{ github.ref_name }}".TrimStart("v")
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Restore dependencies
      run: dotnet restore PdfMerger.sln

    - name: Build
      run: dotnet build PdfMerger.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Run Tests
      run: dotnet test PdfMerger.sln --configuration Release --no-build --verbosity normal

    - name: Publish self-contained
      run: >
        dotnet publish src/PdfMerger/PdfMerger.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:EnableCompressionInSingleFile=true
        -p:Version=${{ steps.version.outputs.VERSION }}
        --output publish

    - name: Create Release Archive (ZIP)
      run: |
        Compress-Archive -Path publish\* -DestinationPath PdfMerger-${{ github.ref_name }}.zip
      shell: pwsh

    - name: Install Inno Setup
      run: |
        choco install innosetup -y --no-progress
      shell: pwsh

    - name: Build Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.VERSION }}" installer\PdfMergerSetup.iss
      shell: pwsh

    - name: Rename installer with version
      run: |
        $issOutput = Get-ChildItem installer\output\*.exe | Select-Object -First 1
        Copy-Item $issOutput.FullName "PdfMergerSetup-${{ github.ref_name }}.exe"
      shell: pwsh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          PdfMerger-${{ github.ref_name }}.zip
          PdfMergerSetup-${{ github.ref_name }}.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Doxygen
      run: sudo apt-get install -y doxygen

    - name: Generate Doxygen Documentation
      run: |
        cd doxygen
        doxygen Doxyfile

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install MkDocs Material
      run: pip install mkdocs-material

    - name: Inject version into docs
      run: sed -i "s/__APP_VERSION__/${{ github.ref_name }}/g" docs/overrides/main.html

    - name: Build MkDocs Site
      run: mkdocs build

    - name: Copy Doxygen Output into MkDocs Site
      run: |
        mkdir -p site/doxygen
        cp -r doxygen/output/html/* site/doxygen/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        force_orphan: true
