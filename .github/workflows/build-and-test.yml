name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore PdfMerger.sln

    - name: Build
      run: dotnet build PdfMerger.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test PdfMerger.sln --configuration Release --no-build --verbosity normal
